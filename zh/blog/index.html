 |\n| 反复调试语法错误 | AI 生成正确的代码 |\n| 需要深入了解每个细节 | 专注于整体架构和逻辑 |\n| 学习曲线陡峭 | 快速上手，边做边学 |\n\n### 关键特点\n\n1. **自然语言交互**：用人类语言描述你想要什么，而不是如何实现\n2. **快速原型开发**：从想法到原型，只需要几分钟\n3. **降低技术门槛**：即使是编程新手也能构建复杂应用\n4. **指数级效率提升**：专注于创意和架构，而非细节实现\n\n## 为什么要立即开始？\n\n### 1. 技术成熟度已达临界点\n\n我们正处于一个关键时刻：\n\n- **Claude 3.5 Sonnet** 和 **GPT-4** 的代码生成准确率已经达到专业水平\n- **Cursor** 这样的编辑器将 AI 深度集成到开发流程中\n- **GitHub Copilot** 已经被数百万开发者日常使用\n- **Claude Code** 提供了对话式的编程体验\n\n这些工具已经从\"实验性玩具\"进化为真正的生产力工具。如果你现在还没开始使用，你已经落后了。\n\n### 2. 竞争优势正在形成\n\n想象一下两个开发者：\n\n**开发者 A**（传统方式）：\n- 花 3 天搭建项目基础架构\n- 手写所有组件和样式\n- 反复调试和重构\n- 一周后完成基本功能\n\n**开发者 B**（Vibe Coding）：\n- 30 分钟用 AI 生成项目架构\n- 自然语言描述需求，AI 生成组件\n- AI 辅助调试和优化\n- 一天内完成并迭代多个版本\n\n一年后，谁会积累更多的项目经验？谁会有更强的竞争力？\n\n**早期采用者的优势：**\n- 建立新的工作流程和思维模式\n- 积累 AI 协作的经验\n- 适应未来的工作方式\n- 在招聘市场上脱颖而出\n\n### 3. 成本效益显著\n\n让我用真实数据说话：\n\n- **开发速度提升**：3-5 倍（根据任务复杂度）\n- **调试时间减少**：50-70%\n- **学习新技术的时间**：从数周缩短到数天\n- **代码质量**：AI 生成的代码往往遵循最佳实践\n\n这意味着：\n- 个人开发者可以完成以前需要团队才能做的项目\n- 创业公司可以用更少的资源快速验证想法\n- 学习者可以更快地从入门到精通\n\n## Vibe Coding 的实践场景\n\n### 场景 1：快速原型开发\n\n**传统方式：**\n```\n1. 设计数据库结构 (1 天)\n2. 搭建后端 API (2 天)\n3. 开发前端界面 (3 天)\n4. 对接前后端 (1 天)\n5. 调试和修复 (2 天)\n总计: 9 天\n```\n\n**Vibe Coding 方式：**\n```\n1. 对 AI 描述需求：\n   \"创建一个博客系统，包含文章列表、详情页、\n    标签筛选、搜索功能，使用 Next.js 和 Tailwind CSS\"\n\n2. AI 生成完整项目结构\n3. 根据需求调整细节\n4. 部署上线\n总计: 2-3 小时\n```\n\n**真实案例：**\n我用 Cursor + Claude 在 30 分钟内搭建了一个完整的个人博客系统，包括：\n- Markdown 文章渲染\n- 标签系统和搜索\n- 响应式设计\n- 深色模式\n- SEO 优化\n\n如果用传统方式，这至少需要一周时间。\n\n### 场景 2：学习新技术栈\n\n想学习 Vue 3？React？Svelte？不需要从头啃文档。\n\n**传统学习路径：**\n1. 阅读官方文档\n2. 跟着教程敲代码\n3. 看视频课程\n4. 做练习项目\n5. 遇到问题查阅 Stack Overflow\n\n**Vibe Coding 学习路径：**\n1. 告诉 AI：\"我想用 Vue 3 构建一个 Todo 应用\"\n2. AI 生成代码并解释每个部分\n3. 你提问：\"为什么这里用 ref 而不是 reactive？\"\n4. AI 详细解释概念和最佳实践\n5. 边做边学，快速掌握核心概念\n\n**关键区别：**\n- 传统方式是\"先学后做\"\n- Vibe Coding 是\"边做边学\"\n- 你始终在构建真实项目，而不是做练习题\n\n### 场景 3：调试与优化\n\n**传统调试流程：**\n```javascript\n// 代码出错了，你不知道为什么\nfunction calculateTotal(items) {\n  return items.reduce((sum, item) =\u003e sum + item.price, 0)\n}\n// TypeError: Cannot read property 'price' of undefined\n\n// 开始漫长的调试...\n// 打断点、打 console.log、查文档...\n```\n\n**Vibe Coding 调试：**\n```\n你: \"这段代码报错了，帮我看看什么问题\"\nAI: \"问题在于 items 数组中可能包含 undefined 或 null 值。\n     建议添加过滤和类型检查...\"\n\n你: \"给我一个更健壮的版本\"\nAI: [生成完善的代码，包含错误处理、类型检查、边界条件]\n```\n\n节省的不仅是时间，还有精力和挫败感。\n\n### 场景 4：代码审查与重构\n\n```\n你: \"审查这段代码，有什么可以改进的？\"\n\nAI: \"我注意到以下几点：\n1. 性能问题：这里使用了嵌套循环，时间复杂度是 O(n²)\n2. 安全隐患：没有对用户输入进行验证\n3. 可维护性：函数过长，建议拆分\n4. 类型安全：缺少 TypeScript 类型定义\n\n建议重构方案：[详细的改进代码]\"\n```\n\n相当于有一个 24/7 在线的高级工程师随时帮你 Code Review。\n\n## 如何开始 Vibe Coding？\n\n### 第一步：选择合适的工具\n\n#### 1. **Cursor** —— 最推荐的 AI 编辑器\n- 深度集成 AI 的 VS Code fork\n- 支持项目级别的代码理解\n- 自然的对话式编程体验\n- 价格：$20/月\n\n**适合：** 所有想认真实践 Vibe Coding 的开发者\n\n#### 2. **Claude Code** —— 对话式编程助手\n- 基于 Claude 3.5 Sonnet\n- 直接在终端中使用\n- 适合系统级编程和脚本\n- 免费使用（需要 Claude API）\n\n**适合：** 喜欢命令行的开发者\n\n#### 3. **GitHub Copilot** —— 代码补全神器\n- 最早的 AI 编程助手\n- 强大的代码补全能力\n- 深度集成到 VS Code\n- 价格：$10/月\n\n**适合：** 想要辅助而非主导的开发者\n\n#### 4. **v0.dev** —— 前端组件快速生成\n- Vercel 出品\n- 自然语言生成 React 组件\n- 实时预览和调整\n- 免费试用\n\n**适合：** 前端开发者和设计师\n\n### 第二步：培养新的思维方式\n\nVibe Coding 不仅是工具的改变，更是思维方式的转变：\n\n#### 1. 学会\"提示工程\"（Prompt Engineering）\n\n**差的提示：**\n\u003e \"帮我写一个登录功能\"\n\n**好的提示：**\n\u003e \"使用 Next.js 14 和 TypeScript 创建一个登录页面，需求如下：\n\u003e 1. 使用 Email + Password 登录\n\u003e 2. 集成 NextAuth.js\n\u003e 3. 表单使用 React Hook Form 和 Zod 验证\n\u003e 4. UI 使用 Tailwind CSS，参考 shadcn/ui 风格\n\u003e 5. 添加'记住我'功能和密码重置链接\n\u003e 6. 错误处理和 Loading 状态\"\n\n**关键要素：**\n- **明确的技术栈**\n- **详细的需求列表**\n- **UI/UX 期望**\n- **边界条件**\n\n#### 2. 从细节实现者到架构设计者\n\n以前你需要关心：\n- 这个循环怎么写\n- CSS 的具体属性\n- API 的请求格式\n\n现在你应该关心：\n- 整体架构是否合理\n- 数据流动是否清晰\n- 用户体验是否流畅\n- 代码是否可维护\n\n**角色转变：**\n```\n传统开发者 -\u003e Vibe Coder\n工人 -\u003e 建筑师\n执行者 -\u003e 设计者\n代码编写者 -\u003e 产品塑造者\n```\n\n#### 3. 保持对代码的理解和掌控\n\n**重要原则：永远不要盲目使用 AI 生成的代码**\n\n- **阅读并理解**每一段 AI 生成的代码\n- **测试**所有功能，确保符合预期\n- **重构**不满意的部分\n- **学习**为什么 AI 这样实现\n\n### 第三步：实践建议\n\n#### Week 1: 从小项目开始\n- 用 AI 重写一个你熟悉的小工具\n- 对比传统方式和 Vibe Coding 的效率\n- 建立信任和熟悉流程\n\n**推荐项目：**\n- Todo List（经典入门）\n- 个人博客（实用）\n- 天气查询应用（API 集成练习）\n- Chrome 扩展（小而完整）\n\n#### Week 2: 挑战中型项目\n- 选择一个你一直想做但觉得太复杂的项目\n- 用 AI 辅助完成\n- 记录时间和遇到的问题\n\n**推荐项目：**\n- 全栈博客系统\n- 任务管理工具\n- 简单的电商网站\n- 数据可视化 Dashboard\n\n#### Week 3: 学习新技术\n- 选择一个你不熟悉的技术栈\n- 用 Vibe Coding 方式学习\n- 构建一个小项目验证学习效果\n\n**推荐技术：**\n- React Server Components\n- Rust + WebAssembly\n- Three.js 3D 开发\n- AI/ML 集成\n\n#### Week 4: 优化已有项目\n- 用 AI 审查你的旧代码\n- 重构和优化\n- 添加测试和文档\n\n### 第四步：建立最佳实践\n\n#### 1. 代码审查清单\n```markdown\n[ ] 理解所有 AI 生成的代码\n[ ] 运行测试确保功能正确\n[ ] 检查安全性（XSS、SQL 注入等）\n[ ] 验证性能（不要盲目信任 AI）\n[ ] 添加必要的错误处理\n[ ] 确保代码风格一致\n[ ] 添加注释说明复杂逻辑\n```\n\n#### 2. 迭代式开发\n```\n1. 用 AI 生成基础版本\n2. 测试和反馈\n3. 让 AI 根据反馈改进\n4. 重复 2-3 直到满意\n5. 人工精修细节\n```\n\n#### 3. 保持学习\n- 阅读 AI 生成的代码，理解为什么这样写\n- 查阅相关文档，深入理解概念\n- 将 AI 当作导师，不断提问\n- 分享经验，与其他 Vibe Coder 交流\n\n## 常见误区与注意事项\n\n### 误区 1：\"AI 会取代程序员\"\n\n**现实：**\n- AI 是工具，不是替代品\n- 就像计算器没有取代数学家\n- 汽车没有让我们失去双腿\n- AI 让我们从重复劳动中解放，专注于创造\n\n**人类依然不可替代的：**\n- **创造力**：产品创意和用户体验设计\n- **判断力**：技术选型和架构决策\n- **同理心**：理解用户需求和痛点\n- **责任心**：代码质量和安全保障\n\n### 误区 2：\"不需要学习编程基础\"\n\n**为什么基础仍然重要：**\n\n1. **代码审查**：你需要判断 AI 生成的代码是否正确\n2. **调试能力**：出问题时知道如何定位\n3. **架构设计**：理解系统设计原则\n4. **沟通能力**：更好地向 AI 表达需求\n\n**建议的学习路径：**\n```\n边做边学：\n1. 用 AI 构建项目（实践）\n2. 理解 AI 生成的代码（学习）\n3. 查阅文档深入概念（巩固）\n4. 尝试自己实现（内化）\n```\n\n### 误区 3：\"AI 生成的代码总是正确\"\n\n**常见问题：**\n\n1. **幻觉（Hallucination）**\n   - AI 可能编造不存在的 API\n   - 可能使用过时的语法\n   - 需要你验证和纠正\n\n2. **安全隐患**\n   - 可能缺少输入验证\n   - 可能存在 SQL 注入风险\n   - 需要安全审查\n\n3. **性能问题**\n   - 可能使用低效算法\n   - 可能过度渲染\n   - 需要性能测试\n\n4. **过度工程**\n   - 可能添加不必要的抽象\n   - 可能过度优化\n   - 需要简化\n\n**防范措施：**\n```markdown\n1. 永远测试 AI 生成的代码\n2. 使用 TypeScript 增加类型安全\n3. 编写测试用例\n4. 代码审查\n5. 安全扫描\n6. 性能监控\n```\n\n### 误区 4：\"Vibe Coding 只适合简单项目\"\n\n**事实：**\n\n复杂项目更能体现 Vibe Coding 的优势：\n\n- **大型代码库理解**：AI 可以快速理解整个项目\n- **重构和优化**：AI 可以提供系统性建议\n- **文档生成**：自动生成和更新文档\n- **测试覆盖**：生成全面的测试用例\n\n**真实案例：**\n- 有团队用 AI 重构了 10 万行的遗留代码\n- 有创业公司用 AI 在 2 周内完成 MVP\n- 有开发者用 AI 移植整个应用到新框架\n\n## Vibe Coding 的未来展望\n\n### 1. AI 编程助手的进化\n\n**现在（2025）：**\n- 代码生成和补全\n- 问答和调试\n- 有限的上下文理解\n\n**近期（2025-2026）：**\n- **多模态输入**：通过截图、手绘草图生成 UI\n- **项目级理解**：理解整个代码库的架构和依赖\n- **自动重构**：识别代码坏味道并自动优化\n- **智能测试**：自动生成全面的测试用例\n\n**未来（2027+）：**\n- **意图理解**：通过简单描述生成完整应用\n- **自主开发**：AI 可以独立完成复杂功能\n- **协作编程**：多个 AI 协作开发大型项目\n- **持续优化**：AI 持续监控和改进代码\n\n### 2. 新的协作模式\n\n**人机协同的新范式：**\n\n```\n人类负责：          AI 负责：\n- 产品愿景         - 代码实现\n- 用户体验设计      - 最佳实践应用\n- 架构决策         - 文档生成\n- 质量把关         - 测试覆盖\n- 创新思考         - 重复劳动\n```\n\n**团队协作的变化：**\n- 更小的团队完成更大的项目\n- 专注于产品而非实现\n- 更快的迭代和试错\n- 更多的创新空间\n\n### 3. 编程教育的变革\n\n**传统编程教育：**\n```\n语法 -\u003e 算法 -\u003e 数据结构 -\u003e\n设计模式 -\u003e 框架 -\u003e 项目实践\n（需要 2-4 年）\n```\n\n**AI 时代的编程教育：**\n```\n基本概念 + AI 工具 -\u003e 直接做项目 -\u003e\n边做边学 -\u003e 深入理解底层原理\n（需要 3-6 个月）\n```\n\n**重点转移：**\n- 从\"如何写代码\"到\"如何设计系统\"\n- 从\"记忆语法\"到\"理解概念\"\n- 从\"独立完成\"到\"AI 协作\"\n- 从\"技术深度\"到\"产品思维\"\n\n### 4. 开发者角色的转变\n\n**传统开发者技能：**\n- 编程语言精通\n- 算法和数据结构\n- 框架和工具链\n- 调试和优化\n\n**未来开发者技能：**\n- **产品思维**：理解用户需求\n- **系统设计**：架构和技术选型\n- **AI 协作**：提示工程和工具使用\n- **快速学习**：适应新技术和工具\n- **质量把关**：代码审查和安全\n\n**新的职业路径：**\n```\n初级 Vibe Coder -\u003e 中级产品工程师 -\u003e\n高级架构师 -\u003e 技术产品经理\n```\n\n## 真实案例分享\n\n### 案例 1：30 分钟搭建个人博客\n\n**背景：**\n我想搭建一个技术博客，要求：\n- 使用 Next.js 14\n- Markdown 文章支持\n- 标签和分类\n- 搜索功能\n- 响应式设计\n- 深色模式\n\n**传统方式预计：** 1-2 周\n\n**Vibe Coding 实际：** 30 分钟\n\n**过程：**\n1. 对 Cursor 描述需求（5 分钟）\n2. AI 生成项目结构和核心代码（10 分钟）\n3. 调整 UI 和样式（10 分钟）\n4. 部署到 Vercel（5 分钟）\n\n**结果：**\n- 完整功能的博客系统\n- 优雅的 UI 设计\n- SEO 优化\n- 性能优异\n\n### 案例 2：零基础学习 Three.js\n\n**背景：**\n想做一个 3D 可视化项目，但从未接触过 Three.js。\n\n**传统学习路径：**\n- 阅读官方文档（3-5 天）\n- 看视频教程（5-7 天）\n- 做练习项目（7-10 天）\n- 总计：2-3 周\n\n**Vibe Coding 路径：**\n- Day 1：告诉 AI 想做什么，AI 生成基础场景\n- Day 2：边改代码边问 AI 概念\n- Day 3：完成复杂的 3D 交互\n- 总计：3 天\n\n**关键差异：**\n从第一天就在构建真实项目，而不是做教程练习。\n\n### 案例 3：重构遗留代码\n\n**背景：**\n一个 3 年前的 React 项目，使用 Class Component，需要迁移到 Hooks。\n\n**传统方式：**\n- 理解现有代码（2-3 天）\n- 逐个组件重写（1-2 周）\n- 测试和修复（3-5 天）\n- 总计：3-4 周\n\n**Vibe Coding 方式：**\n- 让 AI 分析项目结构（10 分钟）\n- AI 生成迁移计划（5 分钟）\n- 批量重构组件（2-3 天）\n- AI 辅助测试和修复（1 天）\n- 总计：4-5 天\n\n**效率提升：** 6-8 倍\n\n## 行动计划：从今天开始\n\n### 立即行动（今天）\n\n#### Step 1: 选择工具（15 分钟）\n- 注册 Cursor 或 Claude Code\n- 安装并配置\n\n#### Step 2: 第一个 AI 项目（1 小时）\n用 AI 构建一个简单的 Todo 应用，体验 Vibe Coding：\n\n```\n提示词示例：\n\"使用 React 和 TypeScript 创建一个 Todo 应用，\n包含添加、删除、标记完成功能，使用 localStorage 持久化，\nUI 使用 Tailwind CSS，支持深色模式\"\n```\n\n#### Step 3: 反思和记录（15 分钟）\n- 与传统方式对比，节省了多少时间？\n- 遇到了什么问题？\n- AI 生成的代码质量如何？\n- 学到了什么新知识？\n\n### 第一周计划\n\n**Day 1-2: 熟悉工具**\n- 完成 3-5 个小项目\n- 实验不同的提示词\n- 建立自己的工作流\n\n**Day 3-4: 学习新技术**\n- 选择一个不熟悉的框架或库\n- 用 AI 辅助学习\n- 构建一个小项目\n\n**Day 5-7: 挑战项目**\n- 选择一个中型项目\n- 用 Vibe Coding 完成\n- 记录时间和效率提升\n\n### 第一个月目标\n\n- [ ] 完成 10+ 个 AI 辅助项目\n- [ ] 掌握 2-3 个新技术栈\n- [ ] 建立自己的 Prompt 库\n- [ ] 分享经验（博客/社交媒体）\n- [ ] 加入 Vibe Coding 社区\n\n### 长期发展\n\n**3 个月目标：**\n- 将 Vibe Coding 融入日常工作\n- 效率提升 2-3 倍\n- 完成一个复杂的个人项目\n\n**6 个月目标：**\n- 成为 Vibe Coding 的熟练使用者\n- 帮助他人学习 AI 辅助编程\n- 探索 AI 编程的边界\n\n**1 年目标：**\n- 用 Vibe Coding 完成商业项目\n- 成为团队的 AI 工具推广者\n- 在新的技术浪潮中建立优势\n\n## 结语\n\n### 这不是未来，是现在\n\nVibe Coding 不是科幻概念，不是实验性技术，而是**此时此刻**你就可以使用的生产力工具。\n\n### 技术革命不会等人\n\n- 5 年前，谁能想到 AI 会写代码？\n- 2 年前，谁能想到 AI 代码质量会这么高？\n- 现在，谁能想象 2 年后 AI 会进化到什么程度？\n\n**早期采用者的红利期只有 1-2 年。**\n\n如果你今天开始，你将在明年成为专家。\n如果你明年才开始，你将花费更多时间追赶。\n如果你后年才开始，你可能已经被淘汰。\n\n### 我的邀请\n\n不要只是阅读这篇文章，**立即行动**：\n\n1. **现在**打开 Cursor 或 Claude Code\n2. **今天**完成第一个 AI 辅助项目\n3. **本周**掌握基本的 Vibe Coding 流程\n4. **本月**完成一个你一直想做的项目\n\n### 保持联系\n\n我很想听听你的 Vibe Coding 经历：\n\n- 在评论区分享你的第一个 AI 项目\n- 遇到问题？随时提问\n- 有经验分享？欢迎投稿\n\n**记住：编程的未来不是写更多的代码，而是创造更多的价值。**\n\n现在，关闭这篇文章，打开你的 AI 编程工具，开始你的 Vibe Coding 之旅吧！🚀\n\n---\n\n## 参考资源\n\n### 工具\n- [Cursor](https://cursor.sh) - AI 编程编辑器\n- [Claude Code](https://claude.com/code) - 对话式编程助手\n- [GitHub Copilot](https://github.com/features/copilot) - 代码补全\n- [v0.dev](https://v0.dev) - AI 前端组件生成\n\n### 学习资源\n- [Cursor 官方文档](https://cursor.sh/docs)\n- [Claude API 文档](https://docs.anthropic.com)\n- [Prompt Engineering Guide](https://www.promptingguide.ai)\n\n### 社区\n- [Cursor Discord](https://discord.gg/cursor)\n- [r/ClaudeAI](https://reddit.com/r/ClaudeAI)\n- [AI Coding Twitter](https://twitter.com/search?q=%23AICoding)\n\n---\n\n*最后更新：2025-11-18*\n"])</script><script>self.__next_f.push([1,"17:T1224,"])</script><script>self.__next_f.push([1,"\n\n欢迎使用 Weblog！本指南将帮助你使用这个模板搭建和配置属于自己的博客。\n\n## 在线演示\n\n你可以访问在线演示站点：[ultimate-kernel.fun/Weblog](https://www.ultimate-kernel.fun/Weblog/)\n\n![Weblog 预览](https://api.microlink.io?url=https://www.ultimate-kernel.fun/Weblog/\u0026screenshot=true\u0026meta=false\u0026embed=screenshot.url)\n\n演示站点展示了以下特性：\n- 清新现代的设计风格\n- 深色/浅色主题支持\n- 中英文双语支持\n- 响应式布局\n- 毛玻璃导航效果\n- 技术栈轮播展示\n- 带标签和归档的博客系统\n\n## 前置要求\n\n开始之前，请确保你已安装以下工具：\n- [Node.js](https://nodejs.org/) (v18 或更高版本)\n- [pnpm](https://pnpm.io/) (v8 或更高版本)\n- [Git](https://git-scm.com/)\n\n## 快速开始\n\n1. 克隆仓库：\n```bash\ngit clone https://github.com/aaronlamz/Weblog.git\ncd Weblog\n```\n\n2. 安装依赖：\n```bash\npnpm install\n```\n\n3. 启动开发服务器：\n```bash\npnpm dev\n```\n\n现在你的站点应该运行在 `http://localhost:3000` 了！\n\n## 配置说明\n\n### 基础站点配置\n\n主要配置文件位于 `src/config/site.config.ts`。以下是你需要自定义的关键部分：\n\n```typescript\nexport const siteConfig = {\n  name: '你的站点名称',\n  title: '你的站点标题',\n  description: '你的站点描述',\n  \n  author: {\n    name: '你的名字',\n    email: 'your.email@example.com',\n    avatar: 'https://github.com/你的用户名.png', // GitHub 头像或其他图片链接\n    bio: '个人简介',\n  },\n  \n  social: {\n    github: 'https://github.com/你的用户名',\n    twitter: 'https://twitter.com/你的用户名',\n    email: 'your.email@example.com',\n  }\n}\n```\n\n### 配置 Giscus 评论系统\n\nWeblog 使用 [Giscus](https://giscus.app) 作为评论系统，它基于 GitHub Discussions。以下是配置步骤：\n\n1. 确保你的仓库是公开的\n2. 在仓库中启用 GitHub Discussions：\n   - 进入仓库设置\n   - 滚动到 \"Features\" 部分\n   - 勾选 \"Discussions\"\n\n3. 安装 [Giscus GitHub App](https://github.com/apps/giscus)\n   - 访问 Giscus app 页面\n   - 点击 \"Install\"\n   - 选择你的仓库\n\n4. 获取 Giscus 配置：\n   - 访问 [giscus.app](https://giscus.app)\n   - 输入你的仓库信息\n   - 复制生成的配置\n\n5. 更新 `src/components/comments.tsx` 中的 Giscus 配置：\n```typescript\n\u003cGiscus\n  repo=\"你的用户名/仓库名\"\n  repoId=\"你的仓库ID\"\n  category=\"Announcements\"\n  categoryId=\"分类ID\"\n  mapping=\"pathname\"\n  theme={theme === 'dark' ? 'dark_dimmed' : 'light'}\n  lang={locale === 'zh' ? 'zh-CN' : 'en'}\n/\u003e\n```\n\n### 国际化配置\n\nWeblog 默认支持中文和英文。翻译文件存储在：\n- `messages/en.json` - 英文翻译\n- `messages/zh.json` - 中文翻译\n\n添加或修改翻译：\n\n1. 在两个语言文件中添加你的文本\n2. 在组件中使用翻译键：\n```typescript\nconst t = useTranslations('namespace')\n// ...\n\u003cdiv\u003e{t('key')}\u003c/div\u003e\n```\n\n### 写作博客文章\n\n博客文章使用 MDX 格式，存储在：\n- `content/blog/en/` - 英文文章\n- `content/blog/zh/` - 中文文章\n\n每篇文章都需要包含前置元数据：\n```mdx\n---\ntitle: \"文章标题\"\ndescription: \"简短描述\"\ndate: \"2024-03-20\"\nfeatured: false\n---\n\n你的文章内容...\n```\n\n## 部署说明\n\n### GitHub Pages 部署\n\n1. 更新 `next.config.js`：\n```javascript\nconst basePath = process.env.BASE_PATH || ''\nconst isProduction = process.env.NODE_ENV === 'production'\n\nconst nextConfig = {\n  output: isProduction ? 'export' : undefined,\n  basePath: isProduction ? basePath : '',\n}\n```\n\n2. 配置 GitHub Actions：\n   - 工作流文件已在 `.github/workflows/deploy.yml` 中设置\n   - 在仓库设置中启用 GitHub Pages\n   - 将源设置为 \"GitHub Actions\"\n\n3. 推送你的更改：\n```bash\ngit add .\ngit commit -m \"配置部署\"\ngit push\n```\n\n你的站点将自动部署到 GitHub Pages！\n\n## 自定义设置\n\n### 样式定制\n\nWeblog 使用 Tailwind CSS 进行样式设置。主要配置文件：\n- `tailwind.config.ts` - Tailwind 配置\n- `src/styles/globals.css` - 全局样式\n- 各组件样式使用 Tailwind 类名编写\n\n### 组件定制\n\n你可能想要自定义的关键组件：\n- `src/components/header.tsx` - 导航和站点头部\n- `src/components/footer.tsx` - 站点底部\n- `src/components/theme-toggle.tsx` - 暗/亮模式切换\n- `src/components/language-switcher.tsx` - 语言切换器\n\n## 需要帮助？\n\n如果遇到问题：\n- 查看 [GitHub Issues](https://github.com/aaronlamz/Weblog/issues)\n- 如果找不到解决方案，创建新的 issue\n- 在 GitHub Discussions 中参与讨论\n\n祝你使用愉快！🎉\n"])</script><script>self.__next_f.push([1,"7:[\"$\",\"div\",null,{\"className\":\"container mx-auto
