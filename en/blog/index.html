\"]\nf:[\"$\",\"div\",null,{\"hidden\":true,\"children\":[\"$\",\"$11\",null,{\"fallback\":null,\"children\":[\"$\",\"$L12\",null,{\"promise\":\"$@13\"}]}]}]\n9:null\n"])</script><script>self.__next_f.push([1,"14:I[68082,[\"8079\",\"static/chunks/8079-2b3f7eedf4f1d672.js\",\"7952\",\"static/chunks/7952-cc0e32ac27c90321.js\",\"5612\",\"static/chunks/5612-3c1ae2a8191546c0.js\",\"7454\",\"static/chunks/app/%5Blocale%5D/blog/page-3a757804d437075f.js\"],\"BlogPostList\"]\n15:T10f2,"])</script><script>self.__next_f.push([1,"\n\u003e Time really does fly. Another year has passed, and it feels like the right moment to sum up a pretty ordinary one.\n\n---\n\n## 💻 Work\n\nTwelve years into my career. Nothing dramatic—somewhere in the middle, as they say.\n\n- **What I did this year**: Kept doing Web development as usual. I’m more open-minded about work now: less obsessed with grinding, more willing to try new things when they show up. Prefer a real work–life balance and not pushing myself too hard.\n- **Technical growth**: Started using AI tools like **Cursor** and **Claude Code**, and got a taste of **Vibe Coding**. Writing code has shifted toward designing products with AI; efficiency has clearly gone up.\n- **Vibe Coding**: AI is changing how we program. Using it made me see how powerful vibe coding can be. For straightforward tasks it can break down knowledge barriers and feel like a real “dimension drop.” That’s both risk and opportunity—only way through is to keep learning and grab the chance (classic “always hustling” mindset 😂).\n- **Side gigs \u0026 side projects**: Tried some freelance and personal projects this year. Realized my time management still isn’t good enough; I need to plan better and get more done in less time.\n\n---\n\n## 🏠 Daily Life\n\n### Routine\n\n- **Sleep \u0026 health**: Having a 🐱 has helped—I’ve been going to bed and waking up earlier, so my schedule is more regular. As long as work from the night before doesn’t spill over 😅.\n\n### Hobbies\n\n- **Reading**: Still mostly technical books. I’d like to step away from work reading more and pick up other genres to broaden the view.\n- **Fitness**: I’ve been casually working out for years with no big results—more for general wellness. Next year I might plan diet a bit more and aim for a more standard shape.\n\n---\n\n## ✈️ Travel\n\n### Places I went\n\nI traveled a bit more than in past years. Sticking to the “at least one trip a year” rule—life’s for experiencing.\n\n1. **Altay road trip** — Scenery was great. Last day we got stuck in heavy snow on the road and sat in traffic till dawn. Unforgettable in its own way.\n2. **Bangkok** — First time in Bangkok. Lots of eating and wandering; international vibe was nice.\n3. **Tibet, Ngari (Ali) road trip** — As a Guangdong native, first time seeing thick snowfall. Every day was another “co” (lake), very photogenic. I had altitude sickness and threw up on day one, but the trip was still worth it.\n\n### Takeaway\n\nGetting out more, feeling different cultures and landscapes, does open your eyes.\n\n---\n\n## ❤️ Relationships\n\nNot much to say here. I try to be kind and care more about family. With friends I’m working on better communication and expression. More socializing, more going out, meeting more people, trying more new things.\n\n---\n\n## 🎯 New Experiences\n\n### Sports\n\n- **Skiing** 🎿 — First time ever. Alpine (two skis) was easier to start; snowboard was a lot harder. Planning to keep at it next year.\n- **Badminton** 🏸 — Joined the company badminton group for the first time this year. Good experience; played a couple of matches.\n\n---\n\n## 💰 Investing \u0026 Money\n\n- **How it went**: Overall not great—some wins, some losses, net negative, but almost back to even.\n- **Lessons**: If you don’t understand it, don’t invest. A lot of it is luck anyway; you won’t get rich from it. Better to spend time on things that add more value.\n- **Going forward**: Pay more attention to US stock ETFs and keep building basic financial literacy.\n\n---\n\n## 🌟 Turning 35\n\nI turned 35 in 2025. Honestly it didn’t feel like a big shift—no “I must set big goals” anxiety like at 30. Accepting that ordinary is the norm. Still, it’s a good time to look at my life again and plan the next chapter.\n\n---\n\n## Closing\n\nLooking back at 2025: new experiences with AI and this blog, slowing down and simplifying in daily life, more travel and relationships and trying new sports. Investing was rough but the lessons were real. At 35 I’ve looked at my life a bit more clearly and have a better sense of what matters. Nothing spectacular, but every step was still growth.\n\n**Here’s to becoming a slightly better version of ourselves on the way.** 🚀\n\n---\nTook me a while to finish this—time to start the next leg of the journey.\n\n*Last updated: 2026-03-07*\n"])</script><script>self.__next_f.push([1,"16:T4883,"])</script><script>self.__next_f.push([1,"\n# ALL in AI: Why You Should Start Vibe Coding Right Now?\n\n\u003e The future of programming isn't writing more code, it's expressing your ideas better.\n\n## Introduction: A Revolutionary Shift in Programming Paradigms\n\nRemember when you first learned to code? Starting with Hello World, typing line by line, debugging syntax errors, reading documentation... This process often took months or even years to truly master.\n\nBut everything has changed.\n\nIn 2024, the maturity of AI programming tools reached a critical point. The emergence of Claude, GPT-4, Cursor, GitHub Copilot, and similar tools has transformed \"programming in natural language\" from science fiction into reality. This is **Vibe Coding** — an entirely new programming paradigm.\n\n## What is Vibe Coding?\n\n**Vibe Coding** is an AI-centric approach to programming, with the core philosophy:\n\n\u003e Shift from \"writing code\" to \"conversing with AI,\" describing requirements in natural language and letting AI generate code.\n\n### Traditional Programming vs Vibe Coding\n\n| Traditional Programming | Vibe Coding |\n|------------------------|-------------|\n| Write every line manually | Describe needs in natural language |\n| Search docs and Stack Overflow | Ask AI directly |\n| Repeatedly debug syntax errors | AI generates correct code |\n| Need deep understanding of details | Focus on architecture and logic |\n| Steep learning curve | Quick start, learn by doing |\n\n### Key Features\n\n1. **Natural Language Interaction**: Describe what you want in human language, not how to implement it\n2. **Rapid Prototyping**: From idea to prototype in minutes\n3. **Lower Technical Barriers**: Even beginners can build complex applications\n4. **Exponential Efficiency Gains**: Focus on creativity and architecture, not implementation details\n\n## Why Start Now?\n\n### 1. Technology Maturity Has Reached a Critical Point\n\nWe're at a pivotal moment:\n\n- **Claude 3.5 Sonnet** and **GPT-4** code generation accuracy has reached professional levels\n- Editors like **Cursor** deeply integrate AI into development workflows\n- **GitHub Copilot** is used daily by millions of developers\n- **Claude Code** provides conversational programming experience\n\nThese tools have evolved from \"experimental toys\" into genuine productivity tools. If you haven't started yet, you're already behind.\n\n### 2. Competitive Advantages Are Forming\n\nImagine two developers:\n\n**Developer A** (Traditional approach):\n- Spends 3 days setting up project infrastructure\n- Manually writes all components and styles\n- Repeatedly debugs and refactors\n- Completes basic features in a week\n\n**Developer B** (Vibe Coding):\n- 30 minutes to generate project architecture with AI\n- Describes requirements in natural language, AI generates components\n- AI-assisted debugging and optimization\n- Completes and iterates multiple versions in a day\n\nA year later, who will have accumulated more project experience? Who will be more competitive?\n\n**Early Adopter Advantages:**\n- Establish new workflows and mindsets\n- Accumulate AI collaboration experience\n- Adapt to future work methods\n- Stand out in the job market\n\n### 3. Significant Cost-Benefit Ratio\n\nLet me speak with real data:\n\n- **Development Speed**: 3-5x faster (depending on task complexity)\n- **Debugging Time Reduced**: 50-70%\n- **Learning New Tech**: From weeks to days\n- **Code Quality**: AI-generated code often follows best practices\n\nThis means:\n- Individual developers can complete projects that previously required teams\n- Startups can rapidly validate ideas with fewer resources\n- Learners can progress from beginner to proficient faster\n\n## Vibe Coding Use Cases\n\n### Scenario 1: Rapid Prototyping\n\n**Traditional Approach:**\n```\n1. Design database structure (1 day)\n2. Build backend API (2 days)\n3. Develop frontend UI (3 days)\n4. Connect frontend and backend (1 day)\n5. Debug and fix (2 days)\nTotal: 9 days\n```\n\n**Vibe Coding Approach:**\n```\n1. Describe requirements to AI:\n   \"Create a blog system with article list, detail pages,\n    tag filtering, and search functionality using Next.js and Tailwind CSS\"\n\n2. AI generates complete project structure\n3. Adjust details based on requirements\n4. Deploy\nTotal: 2-3 hours\n```\n\n**Real Example:**\nI built a complete personal blog system with Cursor + Claude in 30 minutes, including:\n- Markdown article rendering\n- Tag system and search\n- Responsive design\n- Dark mode\n- SEO optimization\n\nUsing traditional methods, this would take at least a week.\n\n### Scenario 2: Learning New Tech Stacks\n\nWant to learn Vue 3? React? Svelte? No need to read docs from scratch.\n\n**Traditional Learning Path:**\n1. Read official documentation\n2. Follow tutorials and type code\n3. Watch video courses\n4. Do practice projects\n5. Search Stack Overflow when stuck\n\n**Vibe Coding Learning Path:**\n1. Tell AI: \"I want to build a Todo app with Vue 3\"\n2. AI generates code and explains each part\n3. You ask: \"Why use ref instead of reactive here?\"\n4. AI explains concepts and best practices in detail\n5. Learn by doing, quickly grasp core concepts\n\n**Key Difference:**\n- Traditional: \"Learn first, do later\"\n- Vibe Coding: \"Learn by doing\"\n- You're always building real projects, not doing exercises\n\n### Scenario 3: Debugging and Optimization\n\n**Traditional Debugging:**\n```javascript\n// Code breaks, you don't know why\nfunction calculateTotal(items) {\n  return items.reduce((sum, item) =\u003e sum + item.price, 0)\n}\n// TypeError: Cannot read property 'price' of undefined\n\n// Start lengthy debugging...\n// Breakpoints, console.log, docs...\n```\n\n**Vibe Coding Debugging:**\n```\nYou: \"This code throws an error, help me fix it\"\nAI: \"The issue is that the items array may contain undefined or null values.\n     Recommend adding filtering and type checking...\"\n\nYou: \"Give me a more robust version\"\nAI: [Generates improved code with error handling, type checking, edge cases]\n```\n\nYou save not just time, but also energy and frustration.\n\n### Scenario 4: Code Review and Refactoring\n\n```\nYou: \"Review this code, what can be improved?\"\n\nAI: \"I notice several points:\n1. Performance: Nested loops here, O(n²) complexity\n2. Security: No user input validation\n3. Maintainability: Function too long, suggest splitting\n4. Type safety: Missing TypeScript definitions\n\nSuggested refactoring: [Detailed improved code]\"\n```\n\nIt's like having a senior engineer available 24/7 for code reviews.\n\n## How to Start Vibe Coding?\n\n### Step 1: Choose the Right Tools\n\n#### 1. **Cursor** — Most Recommended AI Editor\n- Deeply integrated AI fork of VS Code\n- Project-level code understanding\n- Natural conversational programming experience\n- Price: $20/month\n\n**Best for:** All developers serious about Vibe Coding\n\n#### 2. **Claude Code** — Conversational Programming Assistant\n- Based on Claude 3.5 Sonnet\n- Works directly in terminal\n- Great for system programming and scripts\n- Free (requires Claude API)\n\n**Best for:** Developers who love command line\n\n#### 3. **GitHub Copilot** — Code Completion Master\n- Original AI programming assistant\n- Powerful code completion\n- Deep VS Code integration\n- Price: $10/month\n\n**Best for:** Developers wanting assistance, not dominance\n\n#### 4. **v0.dev** — Rapid Frontend Component Generation\n- Built by Vercel\n- Natural language to React components\n- Real-time preview and adjustment\n- Free trial\n\n**Best for:** Frontend developers and designers\n\n### Step 2: Cultivate New Mindsets\n\nVibe Coding isn't just a tool change, it's a mindset shift:\n\n#### 1. Learn \"Prompt Engineering\"\n\n**Bad Prompt:**\n\u003e \"Help me write a login feature\"\n\n**Good Prompt:**\n\u003e \"Create a login page using Next.js 14 and TypeScript with these requirements:\n\u003e 1. Email + Password authentication\n\u003e 2. Integrate NextAuth.js\n\u003e 3. Form validation with React Hook Form and Zod\n\u003e 4. UI using Tailwind CSS, following shadcn/ui style\n\u003e 5. Add 'Remember me' and password reset links\n\u003e 6. Error handling and loading states\"\n\n**Key Elements:**\n- **Clear tech stack**\n- **Detailed requirement list**\n- **UI/UX expectations**\n- **Edge cases**\n\n#### 2. From Detail Implementer to Architecture Designer\n\nBefore, you needed to care about:\n- How to write this loop\n- Specific CSS properties\n- API request formats\n\nNow you should care about:\n- Is the overall architecture sound\n- Is the data flow clear\n- Is the user experience smooth\n- Is the code maintainable\n\n**Role Transformation:**\n```\nTraditional Developer -\u003e Vibe Coder\nWorker -\u003e Architect\nExecutor -\u003e Designer\nCode Writer -\u003e Product Shaper\n```\n\n#### 3. Maintain Understanding and Control of Code\n\n**Important Principle: Never blindly use AI-generated code**\n\n- **Read and understand** every piece of AI-generated code\n- **Test** all functionality to ensure it meets expectations\n- **Refactor** unsatisfactory parts\n- **Learn** why AI implemented it that way\n\n### Step 3: Practice Recommendations\n\n#### Week 1: Start with Small Projects\n- Rewrite a familiar small tool with AI\n- Compare traditional vs Vibe Coding efficiency\n- Build trust and familiarize with the process\n\n**Recommended Projects:**\n- Todo List (classic starter)\n- Personal blog (practical)\n- Weather app (API integration practice)\n- Chrome extension (small but complete)\n\n#### Week 2: Challenge Medium Projects\n- Pick a project you've wanted to do but thought too complex\n- Complete it with AI assistance\n- Track time and issues encountered\n\n**Recommended Projects:**\n- Full-stack blog system\n- Task management tool\n- Simple e-commerce site\n- Data visualization dashboard\n\n#### Week 3: Learn New Technology\n- Choose an unfamiliar tech stack\n- Learn using Vibe Coding\n- Build a small project to validate learning\n\n**Recommended Tech:**\n- React Server Components\n- Rust + WebAssembly\n- Three.js 3D development\n- AI/ML integration\n\n#### Week 4: Optimize Existing Projects\n- Use AI to review your old code\n- Refactor and optimize\n- Add tests and documentation\n\n### Step 4: Establish Best Practices\n\n#### 1. Code Review Checklist\n```markdown\n[ ] Understand all AI-generated code\n[ ] Run tests to ensure functionality\n[ ] Check security (XSS, SQL injection, etc.)\n[ ] Verify performance (don't blindly trust AI)\n[ ] Add necessary error handling\n[ ] Ensure consistent code style\n[ ] Add comments for complex logic\n```\n\n#### 2. Iterative Development\n```\n1. Generate base version with AI\n2. Test and provide feedback\n3. Have AI improve based on feedback\n4. Repeat 2-3 until satisfied\n5. Manually polish details\n```\n\n#### 3. Keep Learning\n- Read AI-generated code, understand why it's written that way\n- Consult relevant docs, deeply understand concepts\n- Treat AI as a mentor, keep asking questions\n- Share experiences, exchange with other Vibe Coders\n\n## Common Misconceptions and Precautions\n\n### Misconception 1: \"AI Will Replace Programmers\"\n\n**Reality:**\n- AI is a tool, not a replacement\n- Just as calculators didn't replace mathematicians\n- Cars didn't make us lose our legs\n- AI frees us from repetitive work to focus on creation\n\n**Humans Are Still Irreplaceable For:**\n- **Creativity**: Product ideas and UX design\n- **Judgment**: Tech selection and architecture decisions\n- **Empathy**: Understanding user needs and pain points\n- **Responsibility**: Code quality and security assurance\n\n### Misconception 2: \"Don't Need to Learn Programming Fundamentals\"\n\n**Why Fundamentals Still Matter:**\n\n1. **Code Review**: You need to judge if AI-generated code is correct\n2. **Debugging Skills**: Know how to locate issues\n3. **Architecture Design**: Understand system design principles\n4. **Communication**: Better express requirements to AI\n\n**Recommended Learning Path:**\n```\nLearn by doing:\n1. Build projects with AI (practice)\n2. Understand AI-generated code (learn)\n3. Consult docs for deeper concepts (consolidate)\n4. Try implementing yourself (internalize)\n```\n\n### Misconception 3: \"AI-Generated Code Is Always Correct\"\n\n**Common Issues:**\n\n1. **Hallucinations**\n   - AI may invent non-existent APIs\n   - May use outdated syntax\n   - Requires your verification and correction\n\n2. **Security Vulnerabilities**\n   - May lack input validation\n   - May have SQL injection risks\n   - Needs security review\n\n3. **Performance Issues**\n   - May use inefficient algorithms\n   - May over-render\n   - Needs performance testing\n\n4. **Over-Engineering**\n   - May add unnecessary abstractions\n   - May over-optimize\n   - Needs simplification\n\n**Prevention Measures:**\n```markdown\n1. Always test AI-generated code\n2. Use TypeScript for type safety\n3. Write test cases\n4. Code reviews\n5. Security scanning\n6. Performance monitoring\n```\n\n## The Future of Vibe Coding\n\n### 1. Evolution of AI Programming Assistants\n\n**Now (2025):**\n- Code generation and completion\n- Q\u0026A and debugging\n- Limited context understanding\n\n**Near Future (2025-2026):**\n- **Multimodal Input**: Generate UI from screenshots, hand-drawn sketches\n- **Project-Level Understanding**: Understand entire codebase architecture and dependencies\n- **Auto-Refactoring**: Identify code smells and auto-optimize\n- **Intelligent Testing**: Auto-generate comprehensive test cases\n\n**Future (2027+):**\n- **Intent Understanding**: Generate complete apps from simple descriptions\n- **Autonomous Development**: AI can independently complete complex features\n- **Collaborative Programming**: Multiple AIs collaborate on large projects\n- **Continuous Optimization**: AI continuously monitors and improves code\n\n### 2. New Collaboration Models\n\n**New Paradigm of Human-AI Collaboration:**\n\n```\nHumans Handle:         AI Handles:\n- Product vision       - Code implementation\n- UX design           - Best practices\n- Architecture        - Documentation\n- Quality control     - Test coverage\n- Innovation          - Repetitive work\n```\n\n**Team Collaboration Changes:**\n- Smaller teams complete larger projects\n- Focus on product over implementation\n- Faster iteration and experimentation\n- More innovation space\n\n### 3. Programming Education Transformation\n\n**Traditional Programming Education:**\n```\nSyntax -\u003e Algorithms -\u003e Data Structures -\u003e\nDesign Patterns -\u003e Frameworks -\u003e Projects\n(Takes 2-4 years)\n```\n\n**AI-Era Programming Education:**\n```\nBasic Concepts + AI Tools -\u003e Direct Projects -\u003e\nLearn by Doing -\u003e Deep Understanding\n(Takes 3-6 months)\n```\n\n**Focus Shift:**\n- From \"how to write code\" to \"how to design systems\"\n- From \"memorizing syntax\" to \"understanding concepts\"\n- From \"solo completion\" to \"AI collaboration\"\n- From \"technical depth\" to \"product thinking\"\n\n## Real Case Studies\n\n### Case 1: Building a Personal Blog in 30 Minutes\n\n**Background:**\nI wanted to build a tech blog with requirements:\n- Next.js 14\n- Markdown support\n- Tags and categories\n- Search functionality\n- Responsive design\n- Dark mode\n\n**Traditional Estimate:** 1-2 weeks\n\n**Vibe Coding Actual:** 30 minutes\n\n**Process:**\n1. Describe requirements to Cursor (5 min)\n2. AI generates project structure and core code (10 min)\n3. Adjust UI and styles (10 min)\n4. Deploy to Vercel (5 min)\n\n**Result:**\n- Fully functional blog system\n- Elegant UI design\n- SEO optimized\n- Excellent performance\n\n### Case 2: Learning Three.js from Zero\n\n**Background:**\nWanted to create a 3D visualization project but never touched Three.js.\n\n**Traditional Learning Path:**\n- Read official docs (3-5 days)\n- Watch video tutorials (5-7 days)\n- Do practice projects (7-10 days)\n- Total: 2-3 weeks\n\n**Vibe Coding Path:**\n- Day 1: Tell AI what I want, AI generates base scene\n- Day 2: Modify code while asking AI about concepts\n- Day 3: Complete complex 3D interactions\n- Total: 3 days\n\n**Key Difference:**\nBuilding real projects from day one, not doing tutorial exercises.\n\n## Action Plan: Start Today\n\n### Immediate Action (Today)\n\n#### Step 1: Choose a Tool (15 minutes)\n- Sign up for Cursor or Claude Code\n- Install and configure\n\n#### Step 2: First AI Project (1 hour)\nBuild a simple Todo app with AI to experience Vibe Coding:\n\n```\nExample Prompt:\n\"Create a Todo app using React and TypeScript\nwith add, delete, and mark complete features,\npersist with localStorage, UI with Tailwind CSS,\nsupport dark mode\"\n```\n\n#### Step 3: Reflect and Record (15 minutes)\n- Compared to traditional methods, how much time saved?\n- What issues encountered?\n- How's the AI-generated code quality?\n- What did you learn?\n\n### Week 1 Plan\n\n**Day 1-2: Get Familiar with Tools**\n- Complete 3-5 small projects\n- Experiment with different prompts\n- Establish your workflow\n\n**Day 3-4: Learn New Tech**\n- Choose an unfamiliar framework or library\n- Learn with AI assistance\n- Build a small project to validate learning\n\n**Day 5-7: Challenge Project**\n- Choose a medium-sized project\n- Complete with Vibe Coding\n- Track time and efficiency gains\n\n### Month 1 Goals\n\n- [ ] Complete 10+ AI-assisted projects\n- [ ] Master 2-3 new tech stacks\n- [ ] Build your own Prompt library\n- [ ] Share experiences (blog/social media)\n- [ ] Join Vibe Coding community\n\n## Conclusion\n\n### This Isn't the Future, It's Now\n\nVibe Coding isn't a sci-fi concept or experimental tech, it's a productivity tool you can use **right now**.\n\n### The Tech Revolution Won't Wait\n\n- 5 years ago, who imagined AI would write code?\n- 2 years ago, who knew AI code quality would be this good?\n- Now, who can imagine where AI will evolve in 2 years?\n\n**The early adopter dividend period is only 1-2 years.**\n\nIf you start today, you'll be an expert next year.\nIf you start next year, you'll spend more time catching up.\nIf you start the year after, you might already be obsolete.\n\n### My Invitation\n\nDon't just read this article, **take action now**:\n\n1. **Now** open Cursor or Claude Code\n2. **Today** complete your first AI-assisted project\n3. **This week** master basic Vibe Coding workflow\n4. **This month** complete a project you've always wanted to do\n\n**Remember: The future of programming isn't writing more code, it's creating more value.**\n\nNow, close this article, open your AI programming tool, and start your Vibe Coding journey! 🚀\n\n---\n\n## Resources\n\n### Tools\n- [Cursor](https://cursor.sh) - AI programming editor\n- [Claude Code](https://claude.com/code) - Conversational programming assistant\n- [GitHub Copilot](https://github.com/features/copilot) - Code completion\n- [v0.dev](https://v0.dev) - AI frontend component generation\n\n### Learning Resources\n- [Cursor Official Docs](https://cursor.sh/docs)\n- [Claude API Docs](https:/
